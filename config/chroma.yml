collection_name: remote_sensing_rag
persist_directory: chroma_db
k: 4
data_path: data
md5_hex_store: md5.text
allow_knowledge_file_type: ["txt", "pdf"]

chunk_size: 700
chunk_overlap: 100
separators: ["\n\n", "\n", "。", "！", "？", "；", "，", ".", "!", "?", " ", ""]

# 混合检索配置
hybrid_search:
  enabled: true              # 是否启用混合检索
  bm25_top_k: 15             # BM25 检索候选数
  rrf_k: 60                  # RRF 公式中的常数 k
